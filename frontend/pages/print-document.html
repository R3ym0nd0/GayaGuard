<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Preview</title>
    <link rel="icon" href="../assets/images/logo.jpg" type="image/jpg">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="print-document-page">
    <main class="print-document-shell">
        <section class="print-document-toolbar">
            <div class="print-document-toolbar-copy">
                <span class="print-document-eyebrow">GayaGuard</span>
                <h1 id="printDocumentTitle">Printable Document</h1>
                <p id="printDocumentSubtitle">Preparing your document preview.</p>
            </div>
            <div class="print-document-toolbar-actions">
                <button type="button" class="btn btn-secondary" id="printDocumentBackBtn">Close</button>
                <button type="button" class="btn btn-primary" id="printDocumentPrintBtn">Print Document</button>
            </div>
        </section>

        <section class="print-document-paper" id="printDocumentPaper">
            <div class="print-document-loading">
                <strong>Loading document...</strong>
                <span>Please wait while GayaGuard prepares the print layout.</span>
            </div>
        </section>
    </main>

    <script src="../assets/js/print-document.js"></script>
</body>
</html>
